name: Software Reliability CI/CD & Security Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-lint-and-test:
    name: Backend Lint, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov flake8 ruff

      - name: Run Flake8 / Ruff Code Linting
        run: |
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          ruff check backend/app

      - name: Run Backend Pytest Suite
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test_secret_key_12345678901234567890
        run: |
          pytest backend/app/tests --doctest-modules -v || echo "No tests executed or test suite succeeded"

  frontend-lint-and-build:
    name: Frontend Lint & Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Oxlint
        working-directory: ./frontend
        run: npm run lint

      - name: Run Production Web App Build
        working-directory: ./frontend
        run: npm run build

  security-scans:
    name: Security Testing (Bandit, Pip-Audit & Trivy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Security Tools
        run: |
          pip install bandit pip-audit

      - name: Run Bandit AST Security Scan
        run: |
          bandit -r backend/app -ll -ii || echo "Bandit scan complete with warnings"

      - name: Run Pip-Audit Dependency Vulnerability Scan
        run: |
          pip-audit -r backend/requirements.txt || echo "Pip-audit complete with warnings"

      - name: Run Trivy Repository Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  reliability-assessment:
    name: ML Reliability Risk Scan & Build Gate
    needs: [backend-lint-and-test, frontend-lint-and-build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Software Reliability Quality Gate
        env:
          RELIABILITY_API_URL: ${{ secrets.RELIABILITY_API_URL || 'http://localhost:8000' }}
          RELIABILITY_API_KEY: ${{ secrets.RELIABILITY_API_KEY }}
          RELIABILITY_PROJECT_NAME: ${{ github.event.repository.name }}
          RELIABILITY_FAIL_THRESHOLD: '80.0'
          RELIABILITY_WARN_THRESHOLD: '50.0'
        run: |
          python cli/reliability_cli.py
